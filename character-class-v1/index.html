<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>캐릭터 시트 메이커</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">✏️ 캐릭터 시트 메이커</h1>
    <p class="app-subtitle">나만의 캐릭터를 만들고, 캐릭터 시트를 완성해보세요</p>
  </header>

  <main class="app-main">
    <!-- 캐릭터 미리보기 -->
    <section class="stage-section">
      <div class="stage-frame">
        <div class="binder-holes" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <canvas id="previewCanvas" width="600" height="800"></canvas>
      </div>
    </section>

    <!-- 파츠 선택 -->
    <section class="controls-section">
      <div class="part-picker">
        <h2 class="section-title">헤어</h2>
        <div class="options-row" id="hairOptions"></div>
      </div>

      <div class="part-picker">
        <h2 class="section-title">의상</h2>
        <div class="options-row" id="clothesOptions"></div>
      </div>

      <div class="part-picker">
        <h2 class="section-title">표정</h2>
        <div class="options-row" id="faceOptions"></div>
      </div>

      <!-- 캐릭터 정보 -->
      <div class="info-form">
        <h2 class="section-title">캐릭터 정보</h2>

        <label class="field">
          <span class="field-label">이름</span>
          <input type="text" id="charName" placeholder="캐릭터 이름을 입력하세요" maxlength="20" />
        </label>

        <label class="field">
          <span class="field-label">성격</span>
          <input type="text" id="charPersonality" placeholder="예: 밝고 씩씩함" maxlength="40" />
        </label>

        <h2 class="section-title">능력치</h2>

        <div class="ability-row">
          <span class="ability-label">강점 ①</span>
          <input type="text" id="strength1" class="ability-input" placeholder="강점을 입력하세요" maxlength="20" />
          <div class="gauge" data-field="strength1"></div>
        </div>

        <div class="ability-row">
          <span class="ability-label">강점 ②</span>
          <input type="text" id="strength2" class="ability-input" placeholder="강점을 입력하세요" maxlength="20" />
          <div class="gauge" data-field="strength2"></div>
        </div>

        <div class="ability-row">
          <span class="ability-label">약점 ①</span>
          <input type="text" id="weakness1" class="ability-input" placeholder="약점을 입력하세요" maxlength="20" />
          <div class="gauge" data-field="weakness1"></div>
        </div>

        <div class="ability-row">
          <span class="ability-label">약점 ②</span>
          <input type="text" id="weakness2" class="ability-input" placeholder="약점을 입력하세요" maxlength="20" />
          <div class="gauge" data-field="weakness2"></div>
        </div>
      </div>

      <button id="exportBtn" class="export-btn" type="button">📥 PNG로 저장</button>
    </section>
  </main>

  <script src="js/assets.js"></script>
  <script src="js/character.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
