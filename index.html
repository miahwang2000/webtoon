<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>FlowBoard — Class Flow Runner</title>
<meta name="description" content="Save the sites you use in class, arrange them into a Flow, and run your lesson step by step." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===================================================================
   FlowBoard — Design Tokens
   Concept: "the desk vs. the stage". Prep work (Library, Flow Builder)
   happens on a bright, paper-and-index-card desk. Running a class
   (Run Mode) dims the room to a single lit cue card, like a teacher
   stepping up to run a lesson from a stage-manager's script.
   =================================================================== */
:root{
  --paper:      #EEF0EA;   /* desk background: pale chalk-dust paper   */
  --card:       #FFFFFF;   /* index card surface                       */
  --ink:        #1B2430;   /* primary text / Run Mode background       */
  --ink-soft:   #333E4D;
  --slate:      #5B6472;   /* muted text, labels                       */
  --line:       #DCD7C8;   /* hairline borders on paper                */
  --line-soft:  #E6E2D4;
  --accent:     #E0A72E;   /* chalk yellow — primary actions            */
  --accent-ink: #6B4E10;   /* text-safe tone of accent on light bg      */
  --teal:       #1F8A7A;   /* "Open" / go actions                       */
  --teal-dim:   #E4F2EF;
  --coral:      #C24E37;   /* delete / destructive                      */
  --coral-dim:  #F7E9E5;

  --font-display: 'Space Grotesk', 'Segoe UI', sans-serif;
  --font-body:    'Inter', 'Segoe UI', sans-serif;
  --font-mono:    'IBM Plex Mono', 'Courier New', monospace;

  --radius: 10px;
  --radius-sm: 7px;
  --shadow-card: 0 1px 2px rgba(27,36,48,0.06), 0 1px 0 rgba(27,36,48,0.04);
  --shadow-pop: 0 12px 32px rgba(27,36,48,0.18);
}

*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{ font-family:var(--font-display); margin:0; letter-spacing:-0.01em; }
p{ margin:0; }
button{ font-family:var(--font-body); cursor:pointer; }
input,textarea,select{ font-family:var(--font-body); }
a{ color:inherit; }
::selection{ background:var(--accent); color:var(--ink); }

/* focus visibility, respected everywhere */
a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible{
  outline:2px solid var(--teal);
  outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
}

/* ---------- App shell ---------- */
#app-shell{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:220px;
  flex-shrink:0;
  padding:24px 16px;
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  gap:28px;
}
.brand{
  display:flex;
  align-items:center;
  gap:9px;
  padding:0 8px;
}
.brand-mark{
  width:26px; height:26px;
  border-radius:6px;
  background:var(--ink);
  position:relative;
  flex-shrink:0;
}
.brand-mark::before, .brand-mark::after{
  content:"";
  position:absolute;
  left:6px; right:6px;
  height:2px;
  background:var(--accent);
}
.brand-mark::before{ top:8px; }
.brand-mark::after{ top:15px; right:11px; background:var(--teal); }
.brand-name{ font-size:16px; font-weight:700; }

.nav{ display:flex; flex-direction:column; gap:2px; }
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:9px 10px;
  border:none; background:none;
  border-radius:var(--radius-sm);
  color:var(--slate);
  font-size:14px; font-weight:500;
  text-align:left;
  width:100%;
}
.nav-item:hover{ background:var(--card); }
.nav-item.active{ background:var(--ink); color:#fff; }
.nav-icon{ width:16px; text-align:center; font-family:var(--font-mono); font-size:13px; }

.sidebar-data-actions{
  margin-top:auto;
  display:flex; flex-direction:column; gap:6px;
}

.sidebar-foot{
  font-size:12px;
  color:var(--slate);
  padding:0 8px;
  line-height:1.5;
}

#view-root{
  flex:1;
  min-width:0;
  padding:32px 40px 80px;
}

.view-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:24px;
  flex-wrap:wrap;
}
.view-header h1{ font-size:24px; margin-bottom:4px; }
.view-sub{ color:var(--slate); font-size:14px; max-width:56ch; }

.limit-counter{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--slate);
  white-space:nowrap;
}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:6px;
  padding:9px 16px;
  border-radius:999px;
  border:1px solid transparent;
  font-size:13.5px; font-weight:600;
  white-space:nowrap;
  transition:transform 0.08s ease, background 0.15s ease;
}
.btn:active{ transform:scale(0.97); }
.btn-primary{ background:var(--accent); color:var(--accent-ink); }
.btn-primary:hover{ background:#D49B24; }
.btn-teal{ background:var(--teal); color:#fff; }
.btn-teal:hover{ background:#187767; }
.btn-outline{ background:var(--card); border-color:var(--line); color:var(--ink); }
.btn-outline:hover{ border-color:var(--slate); }
.btn-ghost{ background:none; color:var(--slate); padding:9px 10px; }
.btn-ghost:hover{ color:var(--ink); background:var(--line-soft); }
.btn-danger-ghost{ background:none; color:var(--coral); padding:9px 10px; }
.btn-danger-ghost:hover{ background:var(--coral-dim); }
.btn-sm{ padding:6px 12px; font-size:12.5px; }
.btn-icon{ padding:7px 9px; border-radius:8px; }
.btn:disabled{ opacity:0.4; cursor:not-allowed; }

/* ---------- Cards / grids ---------- */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:14px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow-card);
  padding:16px;
}
.link-card{ display:flex; flex-direction:column; gap:8px; }
.link-card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.link-card-name{ font-weight:600; font-size:14.5px; }
.link-card-url{
  font-family:var(--font-mono);
  font-size:11.5px;
  color:var(--slate);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.tag{
  display:inline-block;
  font-size:10.5px; font-weight:600;
  font-family:var(--font-mono);
  text-transform:uppercase;
  letter-spacing:0.03em;
  color:var(--teal);
  background:var(--teal-dim);
  padding:3px 8px;
  border-radius:5px;
  width:fit-content;
}
.link-card-desc{ font-size:12.5px; color:var(--slate); }
.card-actions{ display:flex; gap:4px; margin-top:auto; padding-top:4px; }

.flow-card{ display:flex; flex-direction:column; gap:10px; }
.flow-card-title{ font-size:16px; font-weight:700; }
.flow-card-meta{ font-size:12px; color:var(--slate); font-family:var(--font-mono); }
.flow-card-desc{ font-size:13px; color:var(--slate); min-height:18px; }
.flow-card-actions{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }

/* ---------- Empty states ---------- */
.empty-state{
  border:1.5px dashed var(--line);
  border-radius:var(--radius);
  padding:40px 24px;
  text-align:center;
  color:var(--slate);
  max-width:460px;
}
.empty-state h3{ color:var(--ink); font-size:16px; margin-bottom:6px; }
.empty-state p{ font-size:13.5px; margin-bottom:16px; }

/* ---------- Forms ---------- */
.field{ display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.field label{ font-size:12.5px; font-weight:600; color:var(--ink-soft); }
.field .hint{ font-size:11.5px; color:var(--slate); font-weight:400; }
.field input[type=text], .field input[type=url], .field textarea, .field select{
  padding:9px 11px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--card);
  font-size:14px;
  color:var(--ink);
  width:100%;
}
.field textarea{ resize:vertical; min-height:60px; }
.field input:focus, .field textarea:focus, .field select:focus{ border-color:var(--teal); }
.field-row{ display:flex; gap:12px; }
.field-row > .field{ flex:1; }
.checkbox-list{ display:flex; flex-direction:column; gap:2px; max-height:220px; overflow-y:auto; border:1px solid var(--line); border-radius:8px; padding:4px; }
.checkbox-row{ display:flex; align-items:center; gap:9px; padding:8px 8px; border-radius:6px; font-size:13.5px; }
.checkbox-row:hover{ background:var(--paper); }
.checkbox-row input{ width:15px; height:15px; accent-color:var(--teal); flex-shrink:0; }
.checkbox-row .cr-name{ font-weight:600; }
.checkbox-row .cr-url{ font-family:var(--font-mono); font-size:11px; color:var(--slate); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed; inset:0;
  background:rgba(27,36,48,0.45);
  display:flex; align-items:flex-start; justify-content:center;
  padding:5vh 16px;
  overflow-y:auto;
  z-index:100;
}
.modal{
  background:var(--paper);
  border-radius:14px;
  box-shadow:var(--shadow-pop);
  width:100%; max-width:520px;
  padding:24px;
}
.modal.modal-wide{ max-width:680px; }
.modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.modal-head h3{ font-size:17px; }
.modal-foot{ display:flex; justify-content:flex-end; gap:8px; margin-top:6px; }

/* ---------- Flow Builder ---------- */
.builder-layout{ display:flex; flex-direction:column; gap:28px; max-width:760px; }
.builder-section{ display:flex; flex-direction:column; gap:12px; }
.builder-section-head{ display:flex; align-items:center; justify-content:space-between; }
.builder-section-head h2{ font-size:14px; text-transform:uppercase; letter-spacing:0.04em; color:var(--slate); font-family:var(--font-mono); font-weight:600; }
.setup-chip-list{ display:flex; flex-wrap:wrap; gap:6px; }
.setup-chip{
  display:flex; align-items:center; gap:6px;
  background:var(--card); border:1px solid var(--line);
  padding:6px 6px 6px 12px; border-radius:999px; font-size:12.5px; font-weight:600;
}
.setup-chip button{ background:none; border:none; color:var(--slate); width:18px; height:18px; border-radius:50%; }
.setup-chip button:hover{ background:var(--coral-dim); color:var(--coral); }
.add-setup-btn{ background:none; border:1px dashed var(--line); padding:6px 14px; border-radius:999px; font-size:12.5px; color:var(--slate); font-weight:600; }
.add-setup-btn:hover{ border-color:var(--teal); color:var(--teal); }

.step-list{ display:flex; flex-direction:column; gap:8px; }
.step-row{
  display:flex; align-items:flex-start; gap:12px;
  background:var(--card); border:1px solid var(--line); border-radius:var(--radius-sm);
  padding:12px 14px;
}
.step-index{ font-family:var(--font-mono); font-weight:600; color:var(--slate); font-size:13px; padding-top:2px; width:22px; flex-shrink:0; }
.step-row-body{ flex:1; min-width:0; }
.step-row-title{ font-weight:600; font-size:14px; }
.step-row-desc{ font-size:12.5px; color:var(--slate); margin-top:2px; }
.step-row-link{ font-family:var(--font-mono); font-size:11px; color:var(--teal); margin-top:4px; }
.step-row-actions{ display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
.step-row-actions .btn-icon{ padding:4px 7px; font-size:12px; }

.builder-foot-actions{ display:flex; gap:8px; padding-top:8px; border-top:1px solid var(--line); }

/* ---------- Run Mode (the lit stage) ---------- */
#run-root{
  position:fixed; inset:0;
  background:var(--ink);
  color:#F2EFE6;
  z-index:200;
  display:none;
  flex-direction:column;
}
#run-root.open{ display:flex; }

.run-topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 24px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  flex-shrink:0;
}
.run-flow-name{ font-family:var(--font-display); font-weight:600; font-size:15px; }
.run-flow-name .eyebrow{ display:block; font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; color:rgba(242,239,230,0.5); font-weight:600; margin-bottom:2px;}
.run-exit-btn{ background:none; border:1px solid rgba(255,255,255,0.18); color:rgba(242,239,230,0.8); border-radius:999px; padding:7px 14px; font-size:12.5px; font-weight:600; }
.run-exit-btn:hover{ border-color:rgba(255,255,255,0.4); color:#fff; }

.run-body{ flex:1; min-height:0; display:flex; overflow:hidden; }

/* left rail: the sequence, the signature element */
.run-rail{
  width:220px; flex-shrink:0;
  border-right:1px solid rgba(255,255,255,0.1);
  padding:20px 10px;
  overflow-y:auto;
}
.rail-item{
  display:flex; align-items:flex-start; gap:10px;
  padding:9px 10px; border-radius:8px;
  cursor:pointer;
  border:none; background:none; width:100%; text-align:left;
  color:rgba(242,239,230,0.55);
}
.rail-item:hover{ background:rgba(255,255,255,0.05); }
.rail-num{ font-family:var(--font-mono); font-size:11.5px; font-weight:600; padding-top:1px; }
.rail-label{ font-size:13px; font-weight:500; line-height:1.35; }
.rail-item.is-current{ background:rgba(224,167,46,0.14); color:#F2EFE6; }
.rail-item.is-current .rail-num{ color:var(--accent); }
.rail-item.is-done .rail-num::after{ content:" ✓"; color:var(--teal); }
.rail-item.is-done{ color:rgba(242,239,230,0.4); }

/* center: the cue card */
.run-stage{
  flex:1; min-width:0;
  display:flex; align-items:center; justify-content:center;
  padding:40px 24px;
  overflow-y:auto;
}
.cue-card{
  width:100%; max-width:560px;
}
.cue-eyebrow{ font-family:var(--font-mono); font-size:11.5px; letter-spacing:0.06em; text-transform:uppercase; color:rgba(242,239,230,0.5); margin-bottom:10px; font-weight:600; }
.cue-title{ font-size:32px; font-weight:700; margin-bottom:14px; letter-spacing:-0.015em; }
.cue-desc{ font-size:15.5px; color:rgba(242,239,230,0.72); margin-bottom:28px; line-height:1.6; white-space:pre-wrap; }
.cue-actions{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.cue-open-btn{
  background:var(--accent); color:var(--accent-ink);
  padding:13px 26px; border-radius:999px; border:none;
  font-size:14.5px; font-weight:700;
}
.cue-open-btn:hover{ background:#efb545; }
.cue-open-note{ font-size:12px; color:rgba(242,239,230,0.45); }
.cue-nav{ display:flex; justify-content:space-between; align-items:center; margin-top:36px; }
.cue-nav-btn{ background:none; border:1px solid rgba(255,255,255,0.18); color:rgba(242,239,230,0.85); padding:9px 18px; border-radius:999px; font-size:13px; font-weight:600; }
.cue-nav-btn:hover{ border-color:rgba(255,255,255,0.4); color:#fff; }
.cue-nav-btn:disabled{ opacity:0.3; cursor:not-allowed; }
.cue-finish-btn{ background:var(--teal); color:#fff; border:none; padding:9px 20px; border-radius:999px; font-size:13px; font-weight:700; }
.cue-finish-btn:hover{ background:#187767; }

/* setup / pre-flight screen */
.preflight-list{ display:flex; flex-direction:column; gap:8px; margin:22px 0 30px; }
.preflight-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:12px 16px;
}
.preflight-row.is-opened{ border-color:rgba(31,138,122,0.5); background:rgba(31,138,122,0.08); }
.preflight-name{ font-weight:600; font-size:14px; }
.preflight-url{ font-family:var(--font-mono); font-size:11px; color:rgba(242,239,230,0.45); }
.preflight-open-btn{ background:none; border:1px solid rgba(255,255,255,0.2); color:#F2EFE6; padding:8px 16px; border-radius:999px; font-size:12.5px; font-weight:600; flex-shrink:0; }
.preflight-open-btn:hover{ border-color:var(--accent); color:var(--accent); }
.preflight-row.is-opened .preflight-open-btn{ border-color:var(--teal); color:var(--teal); }

/* completion screen */
.run-complete{ text-align:center; max-width:420px; }
.run-complete .big-check{ font-size:40px; margin-bottom:12px; }
.run-complete h2{ font-size:24px; margin-bottom:8px; }
.run-complete p{ color:rgba(242,239,230,0.65); margin-bottom:26px; font-size:14px; }

/* ---------- utility ---------- */
.visually-hidden{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
.mt-auto{ margin-top:auto; }

/* ---------- Mobile ---------- */
@media (max-width: 780px){
  #app-shell{ flex-direction:column; }
  .sidebar{
    width:100%; flex-direction:row; align-items:center;
    border-right:none; border-bottom:1px solid var(--line);
    padding:12px 16px; gap:0; justify-content:space-between;
  }
  .brand{ padding:0; }
  .nav{ flex-direction:row; }
  .sidebar-foot{ display:none; }
  .sidebar-data-actions{ display:none; }
  #view-root{ padding:20px 16px 60px; }
  .run-body{ flex-direction:column; }
  .run-rail{
    width:100%; height:auto; max-height:96px;
    border-right:none; border-bottom:1px solid rgba(255,255,255,0.1);
    display:flex; flex-direction:row; gap:2px; padding:10px;
  }
  .rail-item{ flex-direction:column; align-items:center; text-align:center; min-width:64px; }
  .rail-label{ display:none; }
  .cue-title{ font-size:24px; }
  .modal{ padding:18px; }
  .field-row{ flex-direction:column; gap:0; }
}
</style>
</head>
<body>

<div id="app-shell">
  <nav class="sidebar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <span class="brand-name">FlowBoard</span>
    </div>
    <div class="nav" role="tablist" aria-label="Main sections">
      <button class="nav-item" data-view="library" role="tab">
        <span class="nav-icon" aria-hidden="true">::</span> Link Library
      </button>
      <button class="nav-item" data-view="flows" role="tab">
        <span class="nav-icon" aria-hidden="true">→</span> Flows
      </button>
    </div>
    <div class="sidebar-data-actions">
      <button class="btn btn-outline btn-sm" id="btn-export-backup" style="width:100%; justify-content:center;">⬇ Export Backup</button>
      <button class="btn btn-outline btn-sm" id="btn-import-backup" style="width:100%; justify-content:center;">⬆ Import Backup</button>
      <input type="file" id="import-file-input" accept="application/json,.json" class="visually-hidden">
    </div>
    <div class="sidebar-foot" id="sidebar-foot"></div>
  </nav>

  <main id="view-root" aria-live="polite"></main>
</div>

<div id="modal-root"></div>

<div id="run-root" aria-hidden="true"></div>

<!-- PDF export: html2canvas rasterizes the report (so Korean text renders
     correctly via the Noto Sans KR web font) and jsPDF assembles the pages
     and adds clickable link areas on top of the rendered image. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
(function(){
"use strict";

/* =====================================================================
   Storage layer — everything lives in localStorage, nothing leaves
   the browser. Keys are namespaced so they don't collide with anything
   else a teacher might have running on the same GitHub Pages origin.
   ===================================================================== */
const STORAGE_KEYS = { links: "flowboard_links", flows: "flowboard_flows" };

// MVP scale limits — keep the app fast and the Run Mode rail readable.
const LIMITS = { libraryLinks: 50, flowSteps: 10, flowSetupLinks: 10 };

function uid(){
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,8);
}

function loadList(key){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : [];
  }catch(e){
    console.error("FlowBoard: failed to read", key, e);
    return [];
  }
}
function saveList(key, list){
  try{
    localStorage.setItem(key, JSON.stringify(list));
  }catch(e){
    console.error("FlowBoard: failed to save", key, e);
    alert(t("saveFailedAlert"));
  }
}

const Store = {
  getLinks(){ return loadList(STORAGE_KEYS.links); },
  saveLinks(list){ saveList(STORAGE_KEYS.links, list); },
  getFlows(){ return loadList(STORAGE_KEYS.flows); },
  saveFlows(list){ saveList(STORAGE_KEYS.flows, list); },

  addLink(link){
    const list = this.getLinks();
    list.unshift(Object.assign({ id: uid() }, link));
    this.saveLinks(list);
  },
  updateLink(id, patch){
    const list = this.getLinks().map(l => l.id === id ? Object.assign({}, l, patch) : l);
    this.saveLinks(list);
  },
  deleteLink(id){
    this.saveLinks(this.getLinks().filter(l => l.id !== id));
    // Also strip this link out of any flow that references it, so Run Mode
    // never points at a link that no longer exists.
    const flows = this.getFlows().map(f => Object.assign({}, f, {
      setupLinkIds: (f.setupLinkIds||[]).filter(lid => lid !== id),
      steps: (f.steps||[]).map(s => s.linkId === id ? Object.assign({}, s, { linkId: null }) : s)
    }));
    this.saveFlows(flows);
  },
  findLink(id){ return this.getLinks().find(l => l.id === id) || null; },

  addFlow(flow){
    const list = this.getFlows();
    list.unshift(Object.assign({ id: uid(), setupLinkIds:[], steps:[] }, flow));
    this.saveFlows(list);
    return list[0];
  },
  updateFlow(id, patch){
    const list = this.getFlows().map(f => f.id === id ? Object.assign({}, f, patch) : f);
    this.saveFlows(list);
  },
  deleteFlow(id){
    this.saveFlows(this.getFlows().filter(f => f.id !== id));
  },
  findFlow(id){ return this.getFlows().find(f => f.id === id) || null; },
  duplicateFlow(id){
    const f = this.findFlow(id);
    if(!f) return;
    const copy = Object.assign({}, f, {
      id: uid(),
      name: f.name + " (copy)",
      steps: f.steps.map(s => Object.assign({}, s, { id: uid() }))
    });
    const list = this.getFlows();
    list.unshift(copy);
    this.saveFlows(list);
  },

  // Backup / restore. localStorage survives closing the tab or the browser,
  // but it is NOT safe against a cleared cache/site-data, a switched browser,
  // or a switched device — export/import is the escape hatch for those cases.
  exportData(){
    return {
      app: "FlowBoard",
      version: 1,
      exportedAt: new Date().toISOString(),
      links: this.getLinks(),
      flows: this.getFlows()
    };
  },
  importData(data, mode){
    const importedLinks = Array.isArray(data.links) ? data.links : [];
    const importedFlows = Array.isArray(data.flows) ? data.flows : [];
    if (mode === "replace"){
      this.saveLinks(importedLinks);
      this.saveFlows(importedFlows);
      return;
    }
    // merge: keep everything already here, add anything from the backup
    // that isn't already present (matched by id) so re-importing the same
    // file twice doesn't create duplicates.
    const existingLinks = this.getLinks();
    const existingLinkIds = new Set(existingLinks.map(l => l.id));
    this.saveLinks(existingLinks.concat(importedLinks.filter(l => !existingLinkIds.has(l.id))));

    const existingFlows = this.getFlows();
    const existingFlowIds = new Set(existingFlows.map(f => f.id));
    this.saveFlows(existingFlows.concat(importedFlows.filter(f => !existingFlowIds.has(f.id))));
  }
};

/* =====================================================================
   Tiny helpers
   ===================================================================== */
function esc(str){
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}
function normalizeUrl(url){
  url = (url || "").trim();
  if (!url) return "";
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;
  return url;
}
function openLink(url){
  if(!url) return;
  window.open(normalizeUrl(url), "_blank", "noopener,noreferrer");
}

// Look up a description string in the active locale, falling back to English.

const App = { currentView: "library", editingFlowId: null };

const viewRoot = document.getElementById("view-root");
const modalRoot = document.getElementById("modal-root");
const runRoot = document.getElementById("run-root");

function setActiveNav(view){
  document.querySelectorAll(".nav-item").forEach(btn=>{
    btn.classList.toggle("active", btn.dataset.view === view);
  });
}

function navigate(view){
  App.currentView = view;
  setActiveNav(view);
  if (view === "library") renderLibraryView();
  else if (view === "flows") renderFlowsView();
  else if (view === "flow-builder") renderFlowBuilderView(App.editingFlowId);
}

document.querySelectorAll(".nav-item[data-view]").forEach(btn=>{
  btn.addEventListener("click", ()=> navigate(btn.dataset.view));
});

/* =====================================================================
   Modal helper
   ===================================================================== */
function openModal(innerHtml, opts){
  opts = opts || {};
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `<div class="modal ${opts.wide ? 'modal-wide':''}" role="dialog" aria-modal="true">${innerHtml}</div>`;
  backdrop.addEventListener("mousedown", (e)=>{
    if (e.target === backdrop) closeModal();
  });
  modalRoot.innerHTML = "";
  modalRoot.appendChild(backdrop);
  const firstInput = backdrop.querySelector("input, textarea, select");
  if (firstInput) firstInput.focus();
  document.addEventListener("keydown", escCloseHandler);
  return backdrop;
}
function escCloseHandler(e){
  if (e.key === "Escape") closeModal();
}
function closeModal(){
  modalRoot.innerHTML = "";
  document.removeEventListener("keydown", escCloseHandler);
}

/* =====================================================================
   LIBRARY VIEW
   ===================================================================== */
function renderLibraryView(){
  const links = Store.getLinks();
  const atLimit = links.length >= LIMITS.libraryLinks;

  viewRoot.innerHTML = `
    <div class="view-header">
      <div>
        <h1>Link Library</h1>
        <p class="view-sub">${t("libSubtitle")}</p>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="limit-counter">${links.length} / ${LIMITS.libraryLinks}</span>
        <button class="btn btn-primary" id="btn-add-link" ${atLimit ? "disabled" : ""} ${atLimit ? `title="${t('libraryLimitReached')(LIMITS.libraryLinks)}"` : ""}>+ Add Link</button>
      </div>
    </div>
    <div id="library-list"></div>
  `;
  document.getElementById("btn-add-link").addEventListener("click", ()=> openLinkForm());

  const listEl = document.getElementById("library-list");
  if (links.length === 0){
    listEl.innerHTML = `
      <div class="empty-state">
        <h3>${t("libEmptyTitle")}</h3>
        <p>${t("libEmptyDesc")}</p>
        <button class="btn btn-outline btn-sm" id="btn-seed">Add 3 sample links</button>
      </div>`;
    document.getElementById("btn-seed").addEventListener("click", ()=>{
      t("seedLinks").forEach(l => Store.addLink(l));
      renderLibraryView();
    });
    return;
  }

  listEl.innerHTML = `<div class="grid">${links.map(linkCardHtml).join("")}</div>`;
  listEl.querySelectorAll("[data-edit-link]").forEach(btn=>{
    btn.addEventListener("click", ()=> openLinkForm(Store.findLink(btn.dataset.editLink)));
  });
  listEl.querySelectorAll("[data-delete-link]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const link = Store.findLink(btn.dataset.deleteLink);
      if (!link) return;
      if (confirm(STRINGS[UI_LANG].deleteLinkConfirm(link.name))){
        Store.deleteLink(link.id);
        renderLibraryView();
      }
    });
  });
  listEl.querySelectorAll("[data-open-link]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const link = Store.findLink(btn.dataset.openLink);
      if (link) openLink(link.url);
    });
  });
}

function linkCardHtml(link){
  return `
    <div class="card link-card">
      <div class="link-card-top">
        <div>
          <div class="link-card-name">${esc(link.name)}</div>
          <div class="link-card-url">${esc(link.url)}</div>
        </div>
      </div>
      ${link.category ? `<span class="tag">${esc(link.category)}</span>` : ""}
      ${link.description ? `<div class="link-card-desc">${esc(link.description)}</div>` : ""}
      <div class="card-actions">
        <button class="btn btn-teal btn-sm" data-open-link="${link.id}">Open</button>
        <button class="btn btn-ghost btn-sm" data-edit-link="${link.id}">Edit</button>
        <button class="btn btn-danger-ghost btn-sm" data-delete-link="${link.id}">Delete</button>
      </div>
    </div>`;
}

function openLinkForm(existing){
  const isEdit = !!existing;
  openModal(`
    <div class="modal-head">
      <h3>${isEdit ? "Edit Link" : "Add Link"}</h3>
      <button class="btn btn-ghost btn-icon" id="modal-close" aria-label="Close">✕</button>
    </div>
    <form id="link-form">
      <div class="field">
        <label for="lf-name">Name</label>
        <input type="text" id="lf-name" required placeholder="${t('linkNamePh')}" value="${isEdit ? esc(existing.name) : ""}">
      </div>
      <div class="field">
        <label for="lf-url">URL</label>
        <input type="text" id="lf-url" required placeholder="https://" value="${isEdit ? esc(existing.url) : ""}">
      </div>
      <div class="field">
        <label for="lf-category">Category <span class="hint">${t('optionalHint')}</span></label>
        <input type="text" id="lf-category" list="category-options" placeholder="${t('linkCategoryPh')}" value="${isEdit ? esc(existing.category||"") : ""}">
        <datalist id="category-options">
          ${[...new Set(Store.getLinks().map(l=>l.category).filter(Boolean))].map(c=>`<option value="${esc(c)}">`).join("")}
        </datalist>
      </div>
      <div class="field">
        <label for="lf-desc">Description <span class="hint">${t('optionalHint')}</span></label>
        <textarea id="lf-desc" placeholder="${t('linkDescPh')}">${isEdit ? esc(existing.description||"") : ""}</textarea>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary">${isEdit ? "Save Link" : "Add Link"}</button>
      </div>
    </form>
  `);
  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document.getElementById("link-form").addEventListener("submit", (e)=>{
    e.preventDefault();
    const data = {
      name: document.getElementById("lf-name").value.trim(),
      url: normalizeUrl(document.getElementById("lf-url").value),
      category: document.getElementById("lf-category").value.trim(),
      description: document.getElementById("lf-desc").value.trim()
    };
    if (!data.name || !data.url){ return; }
    if (!isEdit && Store.getLinks().length >= LIMITS.libraryLinks){
      alert(t("libraryLimitReached")(LIMITS.libraryLinks));
      return;
    }
    if (isEdit) Store.updateLink(existing.id, data);
    else Store.addLink(data);
    closeModal();
    renderLibraryView();
  });
}

    App.editingFlowId = flow.id;
    navigate("flow-builder");
  });

  const listEl = document.getElementById("flows-list");
  if (flows.length === 0){
    listEl.innerHTML = `
      <div class="empty-state">
        <h3>${t("flowsEmptyTitle")}</h3>
        <p>${t("flowsEmptyDesc")}</p>
      </div>`;
    return;
  }

  listEl.innerHTML = `<div class="grid">${flows.map(flowCardHtml).join("")}</div>`;
  listEl.querySelectorAll("[data-run-flow]").forEach(btn=>{
    btn.addEventListener("click", ()=> startRun(btn.dataset.runFlow));
  });
  listEl.querySelectorAll("[data-export-pdf]").forEach(btn=>{
    btn.addEventListener("click", ()=> exportFlowToPdf(btn.dataset.exportPdf));
  });
  listEl.querySelectorAll("[data-edit-flow]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      App.editingFlowId = btn.dataset.editFlow;
      navigate("flow-builder");
    });
  });
  listEl.querySelectorAll("[data-dup-flow]").forEach(btn=>{
    btn.addEventListener("click", ()=>{ Store.duplicateFlow(btn.dataset.dupFlow); renderFlowsView(); });
  });
  listEl.querySelectorAll("[data-delete-flow]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const flow = Store.findFlow(btn.dataset.deleteFlow);
      if (!flow) return;
      if (confirm(STRINGS[UI_LANG].deleteFlowConfirm(flow.name))){
        Store.deleteFlow(flow.id);
        renderFlowsView();
      }
    });
  });
}

function flowCardHtml(flow){
  const stepCount = (flow.steps||[]).length;
  const setupCount = (flow.setupLinkIds||[]).length;
  return `
    <div class="card flow-card">
      <div>
        <div class="flow-card-title">${esc(flow.name || "Untitled Flow")}</div>
        <div class="flow-card-meta">${setupCount} setup link${setupCount===1?"":"s"} · ${stepCount} step${stepCount===1?"":"s"}</div>
      </div>
      <div class="flow-card-desc">${esc(flow.description||"")}</div>
      <div class="flow-card-actions">
        <button class="btn btn-primary btn-sm" data-run-flow="${flow.id}" ${stepCount===0 ? "disabled":""}>▶ Run</button>
        <button class="btn btn-outline btn-sm" data-export-pdf="${flow.id}">⬇ Export PDF</button>
        <button class="btn btn-outline btn-sm" data-edit-flow="${flow.id}">Edit</button>
        <button class="btn btn-ghost btn-sm" data-dup-flow="${flow.id}">Duplicate</button>
        <button class="btn btn-danger-ghost btn-sm" data-delete-flow="${flow.id}">Delete</button>
      </div>
    </div>`;
}

    </div>

            <button class="btn btn-outline btn-sm" id="btn-add-step" ${(flow.steps||[]).length >= LIMITS.flowSteps ? "disabled" : ""} ${(flow.steps||[]).length >= LIMITS.flowSteps ? `title="${t('stepLimitReached')(LIMITS.flowSteps)}"` : ""}>+ Add Step</button>

        <button class="btn btn-teal" id="btn-run-flow" ${(flow.steps||[]).length===0 ? "disabled":""}>▶ Run this Flow</button>
        <button class="btn btn-outline" id="btn-export-pdf" data-export-pdf="${flow.id}">⬇ Export PDF</button>
      </div>
    </div>
  `;

  document.getElementById("btn-back-flows").addEventListener("click", ()=> navigate("flows"));

  function persistNameDesc(){

    });
  }

  document.getElementById("btn-run-flow").addEventListener("click", ()=>{

function renderSetupChips(flow, links){
  const wrap = document.getElementById("setup-chip-list");
  const badge = document.getElementById("setup-count-badge");
  const chosen = (flow.setupLinkIds||[]).map(id => Store.findLink(id)).filter(Boolean);
  if (badge) badge.textContent = `${chosen.length} / ${LIMITS.flowSetupLinks}`;
  wrap.innerHTML = chosen.map(l => `
      <span class="setup-chip">${esc(l.name)}
        <button data-remove-setup="${l.id}" aria-label="Remove ${esc(l.name)} from setup">✕</button>
      </span>
    `).join("") + `<button class="add-setup-btn" id="btn-add-setup">+ Add setup link</button>`;

  wrap.querySelectorAll("[data-remove-setup]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const current = Store.findFlow(flow.id);
      const ids = (current.setupLinkIds||[]).filter(id => id !== btn.dataset.removeSetup);
      Store.updateFlow(flow.id, { setupLinkIds: ids });
      renderSetupChips(Store.findFlow(flow.id), links);
    });
  });
  document.getElementById("btn-add-setup").addEventListener("click", ()=>{
    if (links.length === 0){
      alert(t("emptyLibraryAlertShort"));
      return;
    }
    openSetupPicker(flow.id, links);
  });
}

function openSetupPicker(flowId, links){
  const flow = Store.findFlow(flowId);
  const chosenIds = new Set(flow.setupLinkIds||[]);
  const max = LIMITS.flowSetupLinks;
  openModal(`
    <div class="modal-head">
      <h3>Choose Setup Links</h3>
      <button class="btn btn-ghost btn-icon" id="modal-close" aria-label="Close">✕</button>
    </div>
    <p class="limit-counter" id="setup-picker-count" style="margin-bottom:8px;"></p>
    <div class="checkbox-list">
      ${links.map(l => `
        <label class="checkbox-row">
          <input type="checkbox" value="${l.id}" ${chosenIds.has(l.id) ? "checked":""}>
          <span>
            <span class="cr-name">${esc(l.name)}</span><br>
            <span class="cr-url">${esc(l.url)}</span>
          </span>
        </label>
      `).join("")}
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-outline" id="modal-cancel">Cancel</button>
      <button type="button" class="btn btn-primary" id="setup-picker-save">Save</button>
    </div>
  `);
  const boxes = [...document.querySelectorAll(".checkbox-list input[type=checkbox]")];
  const countLabel = document.getElementById("setup-picker-count");

  function refreshPickerState(){
    const checkedCount = boxes.filter(b => b.checked).length;
    countLabel.textContent = `${checkedCount} / ${max}`;
    boxes.forEach(b => { if (!b.checked) b.disabled = checkedCount >= max; });
  }
  boxes.forEach(b => b.addEventListener("change", refreshPickerState));
  refreshPickerState();

  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document.getElementById("setup-picker-save").addEventListener("click", ()=>{
    const ids = boxes.filter(b => b.checked).map(b => b.value).slice(0, max);
    Store.updateFlow(flowId, { setupLinkIds: ids });
    closeModal();
    renderSetupChips(Store.findFlow(flowId), links);
  });
}

function renderStepList(flow, links){
  const listEl = document.getElementById("step-list");
  const steps = flow.steps || [];
  if (steps.length === 0){
    listEl.innerHTML = `<div class="empty-state" style="max-width:none;"><p>${t("stepsEmptyDesc")}</p></div>`;
    return;
  }
  listEl.innerHTML = steps.map((s,i)=>{
    const link = s.linkId ? Store.findLink(s.linkId) : null;
    return `
      <div class="step-row">
        <div class="step-index">${String(i+1).padStart(2,"0")}</div>
        <div class="step-row-body">
          <div class="step-row-title">${esc(s.title)}</div>
          ${s.description ? `<div class="step-row-desc">${esc(s.description)}</div>` : ""}
          <div class="step-row-link">${link ? "→ " + esc(link.name) : t("linkRemovedShort")}</div>
        </div>
        <div class="step-row-actions">
          <button class="btn btn-ghost btn-icon" data-move-up="${s.id}" title="Move up" ${i===0?"disabled":""}>↑</button>
          <button class="btn btn-ghost btn-icon" data-move-down="${s.id}" title="Move down" ${i===steps.length-1?"disabled":""}>↓</button>
          <button class="btn btn-ghost btn-icon" data-edit-step="${s.id}" title="Edit">✎</button>
          <button class="btn btn-danger-ghost btn-icon" data-delete-step="${s.id}" title="Delete">🗑</button>
        </div>
      </div>`;
  }).join("");

  listEl.querySelectorAll("[data-move-up]").forEach(btn=> btn.addEventListener("click", ()=> moveStep(flow.id, btn.dataset.moveUp, -1)));
  listEl.querySelectorAll("[data-move-down]").forEach(btn=> btn.addEventListener("click", ()=> moveStep(flow.id, btn.dataset.moveDown, 1)));
  listEl.querySelectorAll("[data-edit-step]").forEach(btn=> btn.addEventListener("click", ()=> openStepForm(flow.id, btn.dataset.editStep)));
  listEl.querySelectorAll("[data-delete-step]").forEach(btn=> btn.addEventListener("click", ()=>{
    const current = Store.findFlow(flow.id);
    Store.updateFlow(flow.id, { steps: current.steps.filter(s => s.id !== btn.dataset.deleteStep) });
    renderFlowBuilderView(flow.id);
  }));
}

function moveStep(flowId, stepId, direction){
  const flow = Store.findFlow(flowId);
  const steps = [...flow.steps];
  const idx = steps.findIndex(s => s.id === stepId);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= steps.length) return;
  [steps[idx], steps[newIdx]] = [steps[newIdx], steps[idx]];
  Store.updateFlow(flowId, { steps });
  renderFlowBuilderView(flowId);
}

function openStepForm(flowId, stepId){
  const flow = Store.findFlow(flowId);
  const links = Store.getLinks();
  const existing = stepId ? flow.steps.find(s=>s.id===stepId) : null;
  const isEdit = !!existing;

  if (links.length === 0){
    alert(t("emptyLibraryAlertLong"));
    return;
  }
  if (!isEdit && (flow.steps||[]).length >= LIMITS.flowSteps){
    alert(t("stepLimitReached")(LIMITS.flowSteps));
    return;
  }

  openModal(`
    <div class="modal-head">
      <h3>${isEdit ? "Edit Step" : "Add Step"}</h3>
      <button class="btn btn-ghost btn-icon" id="modal-close" aria-label="Close">✕</button>
    </div>
    <form id="step-form">
      <div class="field">
        <label for="sf-title">Step title</label>
        <input type="text" id="sf-title" required placeholder="${t('stepTitlePh')}" value="${isEdit ? esc(existing.title):""}">
      </div>
      <div class="field">
        <label for="sf-desc">Description <span class="hint">${t('optionalHint')}</span></label>
        <textarea id="sf-desc" placeholder="${t('stepDescPh')}">${isEdit ? esc(existing.description||""):""}</textarea>
      </div>
      <div class="field">
        <label for="sf-link">Link to open</label>
        <select id="sf-link" required>
          <option value="" disabled ${!isEdit || !existing.linkId ? "selected":""}>Choose a link…</option>
          ${links.map(l => `<option value="${l.id}" ${isEdit && existing.linkId===l.id ? "selected":""}>${esc(l.name)} — ${esc(l.url)}</option>`).join("")}
        </select>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary">${isEdit ? "Save Step" : "Add Step"}</button>
      </div>
    </form>
  `);
  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document.getElementById("step-form").addEventListener("submit", (e)=>{
    e.preventDefault();
    const data = {
      title: document.getElementById("sf-title").value.trim(),
      description: document.getElementById("sf-desc").value.trim(),
      linkId: document.getElementById("sf-link").value
    };
    if (!data.title || !data.linkId) return;
    const current = Store.findFlow(flowId);
    let steps = current.steps || [];
    if (isEdit){
      steps = steps.map(s => s.id === existing.id ? Object.assign({}, s, data) : s);
    } else {
      steps = [...steps, Object.assign({ id: uid() }, data)];
    }
    Store.updateFlow(flowId, { steps });
    closeModal();
    renderFlowBuilderView(flowId);
  });
}

/* =====================================================================
   RUN MODE
   The stage: dark, focused, one cue card at a time. Run Mode opens in
   its own small popup window docked to the left of the screen, so it
   stays visible and reachable while the actual sites (opened in new
   tabs) take over the main browser window. If the browser blocks the
   pop-up, we fall back to the old in-page overlay so Run Mode still
   works — just without the floating window.
   ===================================================================== */
const RunState = { flowId:null, phase:"setup", currentStepIndex:0, openedSetup:new Set() };

// True when THIS document is the small run popup (opened via ?run=<flowId>),
// as opposed to the main Library/Flows window.
const IS_RUN_POPUP = new URLSearchParams(location.search).has("run");

function startRun(flowId){
  const flow = Store.findFlow(flowId);
  if (!flow || (flow.steps||[]).length === 0){
    alert(t("noStepsRunAlert"));
    return;
  }
  const url = `${location.pathname}?run=${encodeURIComponent(flowId)}`;
  const features = `width=420,height=420,left=0,top=0,resizable=yes,scrollbars=yes`;
  const popup = window.open(url, "flowboard-run", features);
  if (!popup){
    alert(t("popupBlockedFallback"));
    beginRunInThisWindow(flowId);
    return;
  }
  popup.focus();
}

// Shared by: the popup window booting straight into Run Mode, and the
// in-page fallback used when a pop-up gets blocked.
function beginRunInThisWindow(flowId){
  const flow = Store.findFlow(flowId);
  if (!flow || (flow.steps||[]).length === 0) return;
  RunState.flowId = flowId;
  RunState.currentStepIndex = 0;
  RunState.openedSetup = new Set();
  RunState.phase = (flow.setupLinkIds||[]).length > 0 ? "setup" : "steps";
  runRoot.classList.add("open");
  runRoot.setAttribute("aria-hidden","false");
  renderRun();
}

function exitRun(){
  if (!confirm(t("exitRunConfirm"))) return;
  if (IS_RUN_POPUP){
    window.close();
    return; // some browsers ignore window.close() on windows not opened by script; nothing more we can do
  }
  runRoot.classList.remove("open");
  runRoot.setAttribute("aria-hidden","true");
  runRoot.innerHTML = "";
  RunState.flowId = null;
  navigate("flows");
}

function renderRun(){
  const flow = Store.findFlow(RunState.flowId);
  if (!flow){ exitRun(); return; }

  if (RunState.phase === "setup") return renderRunSetup(flow);
  if (RunState.phase === "complete") return renderRunComplete(flow);
  return renderRunSteps(flow);
}

function renderRunSetup(flow){
  const setupLinks = (flow.setupLinkIds||[]).map(id=>Store.findLink(id)).filter(Boolean);
  runRoot.innerHTML = `
    <div class="run-topbar">
      <div class="run-flow-name"><span class="eyebrow">Setup</span>${esc(flow.name)}</div>
      <button class="run-exit-btn" id="run-exit">Exit Run</button>
    </div>
    <div class="run-body">
      <div class="run-stage">
        <div class="cue-card">
          <div class="cue-eyebrow">${t("preflightEyebrow")}</div>
          <h2 class="cue-title">${t("preflightTitle")}</h2>
          <div class="cue-actions" style="margin-bottom:${setupLinks.length > 1 ? "6px" : "20px"};">
            ${setupLinks.length > 1 ? `<button class="preflight-open-btn" id="run-open-all-setup" style="border-color:var(--accent); color:var(--accent);">Open All (${setupLinks.length})</button>` : ""}
            <button class="cue-open-btn" id="run-start-steps">Start Class →</button>
          </div>
          ${setupLinks.length > 1 ? `<p style="font-size:11.5px; color:rgba(242,239,230,0.45); margin-bottom:20px;">${t("openAllNote")}</p>` : ""}
          <div class="preflight-list">
            ${setupLinks.map(l => `
              <div class="preflight-row ${RunState.openedSetup.has(l.id) ? "is-opened":""}" data-preflight-row="${l.id}">
                <div>
                  <div class="preflight-name">${esc(l.name)}</div>
                  <div class="preflight-url">${esc(l.url)}</div>
                </div>
                <button class="preflight-open-btn" data-open-setup="${l.id}">${RunState.openedSetup.has(l.id) ? "✓ Opened" : "Open"}</button>
              </div>
            `).join("")}
          </div>
          <p class="cue-desc" style="margin-top:20px; margin-bottom:0;">${t("preflightDesc")}</p>
        </div>
      </div>
    </div>
  `;
  document.getElementById("run-exit").addEventListener("click", exitRun);
  document.getElementById("run-start-steps").addEventListener("click", ()=>{
    RunState.phase = "steps";
    renderRun();
  });
  const openAllBtn = document.getElementById("run-open-all-setup");
  if (openAllBtn) openAllBtn.addEventListener("click", ()=>{
    setupLinks.forEach(l => {
      openLink(l.url);
      RunState.openedSetup.add(l.id);
    });
    renderRunSetup(flow);
  });
  runRoot.querySelectorAll("[data-open-setup]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const link = Store.findLink(btn.dataset.openSetup);
      if (link){
        openLink(link.url);
        RunState.openedSetup.add(link.id);
        renderRunSetup(flow);
      }
    });
  });
}

function renderRunSteps(flow){
  const steps = flow.steps || [];
  const idx = RunState.currentStepIndex;
  const step = steps[idx];
  const link = step && step.linkId ? Store.findLink(step.linkId) : null;
  const isLast = idx === steps.length - 1;

  runRoot.innerHTML = `
    <div class="run-topbar">
      <div class="run-flow-name"><span class="eyebrow">${t("runningEyebrow")}</span>${esc(flow.name)}</div>
      <button class="run-exit-btn" id="run-exit">Exit Run</button>
    </div>
    <div class="run-body">
      <nav class="run-rail" aria-label="Step sequence">
        ${steps.map((s,i)=>`
          <button class="rail-item ${i===idx?"is-current":""} ${i<idx?"is-done":""}" data-rail-jump="${i}">
            <span class="rail-num">${String(i+1).padStart(2,"0")}</span>
            <span class="rail-label">${esc(s.title)}</span>
          </button>
        `).join("")}
      </nav>
      <div class="run-stage">
        <div class="cue-card">
          <div class="cue-eyebrow">Step ${idx+1} of ${steps.length}</div>
          <h2 class="cue-title">${esc(step.title)}</h2>
          ${step.description ? `<p class="cue-desc">${esc(step.description)}</p>` : ""}
          <div class="cue-actions">
            ${link
              ? `<button class="cue-open-btn" id="cue-open">Open ${esc(link.name)} ↗</button>`
              : `<span class="cue-open-note">⚠ ${t("linkRemovedNote")}</span>`}
          </div>
          <div class="cue-nav">
            <button class="cue-nav-btn" id="cue-prev" ${idx===0?"disabled":""}>← Previous Step</button>
            ${isLast
              ? `<button class="cue-finish-btn" id="cue-finish">Finish Run ✓</button>`
              : `<button class="cue-nav-btn" id="cue-next">Next Step →</button>`}
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("run-exit").addEventListener("click", exitRun);
  if (link) document.getElementById("cue-open").addEventListener("click", ()=> openLink(link.url));
  const prevBtn = document.getElementById("cue-prev");
  if (prevBtn) prevBtn.addEventListener("click", ()=>{ RunState.currentStepIndex--; renderRun(); });
  const nextBtn = document.getElementById("cue-next");
  if (nextBtn) nextBtn.addEventListener("click", ()=>{ RunState.currentStepIndex++; renderRun(); });
  const finishBtn = document.getElementById("cue-finish");
  if (finishBtn) finishBtn.addEventListener("click", ()=>{ RunState.phase = "complete"; renderRun(); });
  runRoot.querySelectorAll("[data-rail-jump]").forEach(btn=>{
    btn.addEventListener("click", ()=>{ RunState.currentStepIndex = Number(btn.dataset.railJump); renderRun(); });
  });
}

function renderRunComplete(flow){
  runRoot.innerHTML = `
    <div class="run-topbar">
      <div class="run-flow-name"><span class="eyebrow">${t("doneEyebrow")}</span>${esc(flow.name)}</div>
      <button class="run-exit-btn" id="run-exit">Exit Run</button>
    </div>
    <div class="run-body">
      <div class="run-stage">
        <div class="run-complete">
          <div class="big-check">✓</div>
          <h2>${t("flowCompleteTitle")}</h2>
          <p>${STRINGS[UI_LANG].flowCompleteDesc(flow.name, flow.steps.length)}</p>
          <div class="cue-actions" style="justify-content:center;">
            <button class="cue-open-btn" id="run-again">Run it again</button>
            <button class="cue-nav-btn" id="back-to-flows">${IS_RUN_POPUP ? "Close" : "Back to Flows"}</button>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("run-exit").addEventListener("click", exitRun);
  document.getElementById("run-again").addEventListener("click", ()=> beginRunInThisWindow(flow.id));
  document.getElementById("back-to-flows").addEventListener("click", ()=>{
    if (IS_RUN_POPUP){ window.close(); return; }
    runRoot.classList.remove("open");
    runRoot.setAttribute("aria-hidden","true");
    runRoot.innerHTML = "";
    navigate("flows");
  });
}

/* =====================================================================
   PDF Export
   Renders a Flow's Setup + Steps as a printable report and downloads it
   as a PDF with clickable links. We rasterize the report with
   html2canvas (via the Noto Sans KR web font already loaded in <head>)
   rather than drawing text with jsPDF directly, because jsPDF's built-in
   fonts don't include Hangul glyphs — this keeps Korean Flow/Step names
   readable in the PDF. jsPDF then adds real clickable link areas on top
   of the rendered image, at the same coordinates the link text sits at.
   ===================================================================== */
function buildFlowReportHtml(flow){
  const setupLinks = (flow.setupLinkIds||[]).map(id=>Store.findLink(id)).filter(Boolean);
  const steps = flow.steps || [];

  let html = `
    <div style="font-family:'Noto Sans KR', sans-serif;">
      <div style="font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#5B6472; font-weight:700; margin-bottom:8px;">FlowBoard</div>
      <div style="font-size:26px; font-weight:700; color:#1B2430; margin-bottom:${flow.description ? "10px" : "22px"};">${esc(flow.name || "Untitled Flow")}</div>
      ${flow.description ? `<div style="font-size:13px; color:#5B6472; margin-bottom:22px; white-space:pre-wrap; line-height:1.6;">${esc(flow.description)}</div>` : ""}
  `;

  if (setupLinks.length){
    html += `<div style="font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#5B6472; margin:18px 0 10px; border-top:2px solid #1B2430; padding-top:14px;">Setup</div>`;
    setupLinks.forEach((l,i)=>{
      html += `
        <div style="padding:10px 0; border-bottom:1px solid #E6E2D4;">
          <div style="font-size:14px; font-weight:700; color:#1B2430;">${i+1}. ${esc(l.name)}</div>
          <div data-pdf-link data-url="${esc(normalizeUrl(l.url))}" style="font-size:11.5px; color:#1F8A7A; margin-top:2px; display:inline-block;">${esc(l.url)}</div>
        </div>`;
    });
  }

  if (steps.length){
    html += `<div style="font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#5B6472; margin:22px 0 10px; border-top:2px solid #1B2430; padding-top:14px;">Steps</div>`;
    steps.forEach((s,i)=>{
      const link = s.linkId ? Store.findLink(s.linkId) : null;
      html += `
        <div style="padding:12px 0; border-bottom:1px solid #E6E2D4;">
          <div style="font-size:14px; font-weight:700; color:#1B2430;">${i+1}. ${esc(s.title)}</div>
          ${s.description ? `<div style="font-size:12px; color:#5B6472; margin-top:3px; white-space:pre-wrap; line-height:1.5;">${esc(s.description)}</div>` : ""}
          ${link
            ? `<div data-pdf-link data-url="${esc(normalizeUrl(link.url))}" style="font-size:11.5px; color:#1F8A7A; margin-top:5px; display:inline-block;">→ ${esc(link.name)} — ${esc(link.url)}</div>`
            : `<div style="font-size:11.5px; color:#C24E37; margin-top:5px;">${t("linkRemovedShort")}</div>`}
        </div>`;
    });
  }

  html += `<div style="margin-top:26px; font-size:10px; color:#9AA1AC;">${t("pdfGeneratedBy")(new Date().toLocaleDateString())}</div>`;
  html += `</div>`;
  return html;
}

async function exportFlowToPdf(flowId){
  const flow = Store.findFlow(flowId);
  if (!flow) return;

  const buttons = Array.from(document.querySelectorAll(`[data-export-pdf="${flowId}"]`));
  const originalLabels = buttons.map(b => b.textContent);
  buttons.forEach(b => { b.disabled = true; b.textContent = t("pdfGenerating"); });

  let container = null;
  try{
    if (typeof window.html2canvas !== "function" || !window.jspdf){
      throw new Error("PDF libraries not loaded");
    }

    // Make sure Noto Sans KR is actually ready before we rasterize, or
    // Korean text renders as fallback tofu boxes.
    if (document.fonts && document.fonts.load){
      await Promise.all([
        document.fonts.load("400 14px 'Noto Sans KR'"),
        document.fonts.load("700 14px 'Noto Sans KR'")
      ]);
    }
    if (document.fonts && document.fonts.ready) await document.fonts.ready;

    container = document.createElement("div");
    container.style.cssText = "position:fixed; left:-9999px; top:0; width:720px; background:#FFFFFF; padding:40px;";
    container.innerHTML = buildFlowReportHtml(flow);
    document.body.appendChild(container);

    await new Promise(resolve => setTimeout(resolve, 60)); // let layout settle

    const containerRect = container.getBoundingClientRect();
    const linkRects = Array.from(container.querySelectorAll("[data-pdf-link]")).map(el=>{
      const r = el.getBoundingClientRect();
      return {
        url: el.dataset.url,
        top: r.top - containerRect.top,
        left: r.left - containerRect.left,
        width: r.width,
        height: r.height
      };
    });

    const scale = 2;
    const canvas = await window.html2canvas(container, { scale, backgroundColor: "#FFFFFF" });

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "a4" });
    const pdfWidthPt = doc.internal.pageSize.getWidth();
    const pdfHeightPt = doc.internal.pageSize.getHeight();
    const ptPerCssPx = pdfWidthPt / containerRect.width;
    const pageHeightCssPx = pdfHeightPt / ptPerCssPx;
    const pageHeightCanvasPx = pageHeightCssPx * scale;

    let sy = 0;
    let pageIndex = 0;
    while (sy < canvas.height){
      const sliceHeightCanvasPx = Math.min(pageHeightCanvasPx, canvas.height - sy);
      const sliceCanvas = document.createElement("canvas");
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = sliceHeightCanvasPx;
      sliceCanvas.getContext("2d").drawImage(
        canvas, 0, sy, canvas.width, sliceHeightCanvasPx, 0, 0, canvas.width, sliceHeightCanvasPx
      );
      const imgData = sliceCanvas.toDataURL("image/png");
      const sliceHeightPt = (sliceHeightCanvasPx / scale) * ptPerCssPx;

      if (pageIndex > 0) doc.addPage();
      doc.addImage(imgData, "PNG", 0, 0, pdfWidthPt, sliceHeightPt);

      const pageTopCss = pageIndex * pageHeightCssPx;
      const pageBottomCss = pageTopCss + pageHeightCssPx;
      linkRects.forEach(le=>{
        if (le.top >= pageTopCss && le.top < pageBottomCss){
          const localTopCss = le.top - pageTopCss;
          doc.link(le.left * ptPerCssPx, localTopCss * ptPerCssPx, le.width * ptPerCssPx, le.height * ptPerCssPx, { url: le.url });
        }
      });

      sy += pageHeightCanvasPx;
      pageIndex++;
    }

    const safeName = (flow.name || "flow").trim().replace(/[^\w\-\u3131-\uD79D]+/g, "_").slice(0, 60) || "flow";
    doc.save(`${safeName}.pdf`);
  }catch(err){
    console.error("FlowBoard: PDF export failed", err);
    alert(t("pdfExportFailed"));
  }finally{
    if (container && container.parentNode) container.parentNode.removeChild(container);
    buttons.forEach((b,i) => { b.disabled = false; b.textContent = originalLabels[i]; });
  }
}

/* =====================================================================
   Backup / Restore (Export & Import)
   ===================================================================== */
function handleExportBackup(){
  const data = Store.exportData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const dateStamp = new Date().toISOString().slice(0,10);
  const a = document.createElement("a");
  a.href = url;
  a.download = `flowboard-backup-${dateStamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleImportFileSelected(e){
  const file = e.target.files[0];
  e.target.value = ""; // reset so selecting the same file again still fires 'change'
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try{
      data = JSON.parse(reader.result);
    }catch(err){
      alert(t("importParseError"));
      return;
    }
    if (!data || (!Array.isArray(data.links) && !Array.isArray(data.flows))){
      alert(t("importInvalidFile"));
      return;
    }
    openImportChoiceModal(data);
  };
  reader.onerror = () => alert(t("importParseError"));
  reader.readAsText(file);
}

function openImportChoiceModal(data){
  const linkCount = Array.isArray(data.links) ? data.links.length : 0;
  const flowCount = Array.isArray(data.flows) ? data.flows.length : 0;

  openModal(`
    <div class="modal-head">
      <h3>${t("importPickTitle")}</h3>
      <button class="btn btn-ghost btn-icon" id="modal-close" aria-label="Close">✕</button>
    </div>
    <p style="font-size:13.5px; color:var(--slate); margin-bottom:18px;">${t("importPickDesc")(linkCount, flowCount)}</p>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div class="card" style="display:flex; flex-direction:column; gap:8px;">
        <strong style="font-size:14px;">Merge</strong>
        <p style="font-size:12.5px; color:var(--slate);">${t("importMergeDesc")}</p>
        <button class="btn btn-primary btn-sm" id="import-merge-btn" style="align-self:flex-start;">Merge with existing</button>
      </div>
      <div class="card" style="display:flex; flex-direction:column; gap:8px;">
        <strong style="font-size:14px;">Replace</strong>
        <p style="font-size:12.5px; color:var(--slate);">${t("importReplaceDesc")}</p>
        <button class="btn btn-danger-ghost btn-sm" id="import-replace-btn" style="align-self:flex-start; border:1px solid var(--line);">Replace all data</button>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-outline" id="modal-cancel">Cancel</button>
    </div>
  `);
  document.getElementById("modal-close").addEventListener("click", closeModal);
  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document.getElementById("import-merge-btn").addEventListener("click", ()=> finishImport(data, "merge"));
  document.getElementById("import-replace-btn").addEventListener("click", ()=>{
    if (confirm(t("importReplaceDesc"))) finishImport(data, "replace");
  });
}

function finishImport(data, mode){
  Store.importData(data, mode);
  closeModal();
  const linkCount = Array.isArray(data.links) ? data.links.length : 0;
  const flowCount = Array.isArray(data.flows) ? data.flows.length : 0;
  alert(t("importSuccess")(linkCount, flowCount));
  navigate(App.currentView === "flow-builder" ? "flows" : App.currentView);
}

document.getElementById("btn-export-backup").addEventListener("click", handleExportBackup);
document.getElementById("btn-import-backup").addEventListener("click", ()=>{
  document.getElementById("import-file-input").click();
});
document.getElementById("import-file-input").addEventListener("change", handleImportFileSelected);

/* =====================================================================
   Boot
   ===================================================================== */
if (IS_RUN_POPUP){
  // This document is the small run popup: skip the normal app shell
  // entirely and boot straight into Run Mode for the requested Flow.
  const requestedFlowId = new URLSearchParams(location.search).get("run");
  document.body.classList.add("is-run-popup");
  document.getElementById("app-shell").style.display = "none";
  if (Store.findFlow(requestedFlowId)){
    beginRunInThisWindow(requestedFlowId);
  } else {
    document.body.innerHTML = "";
    window.close();
  }
} else {
  document.getElementById("sidebar-foot").textContent = `${t("sidebarFoot")} ${t("backupNote")}`;
  navigate("library");
}

})();
</script>
